version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gst_genie
      POSTGRES_PASSWORD: gst_genie_pass
      POSTGRES_DB: gst_genie
    ports:
      - "5432:5432"
    volumes:
      - gst_genie_pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  gst_genie_pg_data:
